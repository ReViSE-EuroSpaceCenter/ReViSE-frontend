name: CI Pull Request Main

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  eslint:
    needs: tests
    if: success()
    uses: ./.github/workflows/eslint.yml

  sonar:
    needs: tests
    if: success()
    uses: ./.github/workflows/sonarcloud.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}