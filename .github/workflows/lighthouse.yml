name: Lighthouse CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - main

  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  lighthouse-ci:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://test-revise.org

      - name: Start server
        run: |
          npm run start & 
          npx wait-on http://localhost:3000
        env:
          NEXT_PUBLIC_API_URL: https://test-revise.org

      - name: Set test URL
        id: test_url
        run: |
          echo "url=http://localhost:3000" >> $GITHUB_OUTPUT

      - name: Run Lighthouse CI (Mobile)
        id: lhci_mobile
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          artifactName: lhci-mobile
          configPath: ./lhci.mobile.json

      - name: Run Lighthouse CI (Desktop)
        id: lhci_desktop
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          artifactName: lhci-desktop
          configPath: ./lhci.desktop.json

      - name: Comment on PR with Lighthouse results
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = "${{ steps.test_url.outputs.url }}".replace(/\/$/, "");
    
            const manifestMobile = JSON.parse(`${{ steps.lhci_mobile.outputs.manifest }}`);
            const manifestDesktop = JSON.parse(`${{ steps.lhci_desktop.outputs.manifest }}`);
    
            const pct = v => Math.round(v * 100);
            const color = score => score >= 90 ? "🟢" : score >= 50 ? "🟠" : "🔴";
    
            function rowsFromManifest(manifest, label) {
              let rows = `### ${label}\n\n`;
              rows += `| URL | Perf | A11y | Best Practices | SEO |\n`;
              rows += `| --- | ---- | ---- | -------------- | --- |\n`;

              for (const entry of sorted) {
                const url = entry.url;
                const s = entry.summary;
    
                const perf = pct(s.performance);
                const a11y = pct(s.accessibility);
                const bp = pct(s["best-practices"]);
                const seo = pct(s.seo);
    
                const path = url.replace(previewUrl, "") || "/";
                rows += `| ${path} | ${color(perf)} ${perf} | ${color(a11y)} ${a11y} | ${color(bp)} ${bp} | ${color(seo)} ${seo} |\n`;
              }
              return rows + "\n";
            }

            let body = `## 🚦 Lighthouse Results\n\n`;
            body += `Preview URL: ${previewUrl}\n\n`;

            body += `### 📊 Average Scores\n`;
            body += `**Mobile:** Perf ${averageScore(manifestMobile,"performance")}, A11y ${averageScore(manifestMobile,"accessibility")}, Best Practices ${averageScore(manifestMobile,"best-practices")}, SEO ${averageScore(manifestMobile,"seo")}\n`;
            body += `**Desktop:** Perf ${averageScore(manifestDesktop,"performance")}, A11y ${averageScore(manifestDesktop,"accessibility")}, Best Practices ${averageScore(manifestDesktop,"best-practices")}, SEO ${averageScore(manifestDesktop,"seo")}\n\n`;

            body += `<details><summary>📱 Mobile Details</summary>\n\n`;
            body += rowsFromManifest(manifestMobile);
            body += `</details>\n\n`;

            body += `<details><summary>🖥 Desktop Details</summary>\n\n`;
            body += rowsFromManifest(manifestDesktop);
            body += `</details>\n\n`;

            // Vérifie si un commentaire existe déjà
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
    
            const existing = comments.find(c =>
              c.user.type === "Bot" &&
              c.body.includes("🚦 Lighthouse Results")
            );
    
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }